name: Deploy to Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # ===== ガードレールチェック =====
      - name: "Guard: npm audit（本番依存の脆弱性）"
        run: |
          AUDIT_JSON=$(npm audit --omit=dev --json 2>/dev/null || true)
          RESULT=$(echo "$AUDIT_JSON" | node -e "
            const fs=require('fs');
            let j=''; process.stdin.on('data',d=>j+=d); process.stdin.on('end',()=>{
              const data=JSON.parse(j);
              const vulns=data.vulnerabilities||{};
              let ignore=[];
              try { ignore=fs.readFileSync('.audit-ignore','utf8').split('\n')
                .filter(l=>l.trim()&&!l.startsWith('#')).map(l=>l.split(/\s+/)[0]);
              } catch(e){}
              let found=[];
              for(const [name,v] of Object.entries(vulns)){
                if(v.severity!=='high'&&v.severity!=='critical') continue;
                const urls=(v.via||[]).filter(x=>typeof x==='object').map(x=>x.url||'');
                const deps=(v.via||[]).filter(x=>typeof x==='string');
                const isIgnored=urls.some(u=>ignore.some(id=>u.includes(id)))
                  || deps.some(d=>{ const dv=vulns[d]; if(!dv)return false;
                    return(dv.via||[]).filter(x=>typeof x==='object').map(x=>x.url||'')
                      .some(u=>ignore.some(id=>u.includes(id))); });
                if(!isIgnored) found.push(v.severity+' '+name);
              }
              if(found.length>0){ console.error('NG: '+found.join(', ')); process.exit(1); }
              else{ console.log('OK'); }
            });
          ")
          echo "$RESULT"

      - name: "Guard: gitleaks（Secret直書き検出）"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Guard: ビルドチェック"
        run: npm run client:build
      # ===== ガードレールチェック ここまで =====

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Create .env
        run: echo "${{ secrets.DEPLOY_DOT_ENV }}" > .env

      - name: Deploy to staging
        run: |
          set -a; source .env; set +a
          bash scripts/deploy-cloud-run.sh deploy
