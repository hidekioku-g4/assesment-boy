name: Promote Staging to Production

on:
  schedule:
    - cron: '0 16 * * *'  # UTC 16:00 = JST 1:00
  workflow_dispatch: {}

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Get staging image
        id: staging
        run: |
          IMAGE=$(gcloud run services describe assess-kun-staging \
            --region asia-northeast1 \
            --project tl-datamanagement-prod \
            --format='value(spec.template.spec.containers[0].image)' 2>/dev/null)
          if [ -z "$IMAGE" ]; then
            echo "::error::ステージングサービスが見つかりません"
            exit 1
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Check if promotion needed
        id: check
        run: |
          STAGING_IMAGE="${{ steps.staging.outputs.image }}"
          PROD_IMAGE=$(gcloud run services describe assess-kun \
            --region asia-northeast1 \
            --project tl-datamanagement-prod \
            --format='value(spec.template.spec.containers[0].image)' 2>/dev/null || echo "")
          if [ "$STAGING_IMAGE" = "$PROD_IMAGE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "同じイメージです。スキップ。"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to production
        if: steps.check.outputs.skip != 'true'
        run: |
          gcloud run deploy assess-kun \
            --image="${{ steps.staging.outputs.image }}" \
            --region asia-northeast1 \
            --project tl-datamanagement-prod \
            --min-instances 1
